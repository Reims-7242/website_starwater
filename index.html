    <style>
        .video-frame {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
        }
        
        .frame-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #00000000;
        }
        
        .frame-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            animation: slideshow 7.5s infinite;
        }
        
        /* Плавное появление и исчезновение (ускорено) */
        @keyframes slideshow {
            0% { opacity: 0; }
            3% { opacity: 1; }
            7% { opacity: 1; }
            10% { opacity: 0; }
            100% { opacity: 0; }
        }
        
        /* Задержки для 25 кадров (каждый кадр виден ~0.3 сек) */
        .frame-img:nth-child(1) { animation-delay: 0s; }
        .frame-img:nth-child(2) { animation-delay: 0.3s; }
        .frame-img:nth-child(3) { animation-delay: 0.6s; }
        .frame-img:nth-child(4) { animation-delay: 0.9s; }
        .frame-img:nth-child(5) { animation-delay: 1.2s; }
        .frame-img:nth-child(6) { animation-delay: 1.5s; }
        .frame-img:nth-child(7) { animation-delay: 1.8s; }
        .frame-img:nth-child(8) { animation-delay: 2.1s; }
        .frame-img:nth-child(9) { animation-delay: 2.4s; }
        .frame-img:nth-child(10) { animation-delay: 2.7s; }
        .frame-img:nth-child(11) { animation-delay: 3.0s; }
        .frame-img:nth-child(12) { animation-delay: 3.3s; }
        .frame-img:nth-child(13) { animation-delay: 3.6s; }
        .frame-img:nth-child(14) { animation-delay: 3.9s; }
        .frame-img:nth-child(15) { animation-delay: 4.2s; }
        .frame-img:nth-child(16) { animation-delay: 4.5s; }
        .frame-img:nth-child(17) { animation-delay: 4.8s; }
        .frame-img:nth-child(18) { animation-delay: 5.1s; }
        .frame-img:nth-child(19) { animation-delay: 5.4s; }
        .frame-img:nth-child(20) { animation-delay: 5.7s; }
        .frame-img:nth-child(21) { animation-delay: 6.0s; }
        .frame-img:nth-child(22) { animation-delay: 6.3s; }
        .frame-img:nth-child(23) { animation-delay: 6.6s; }
        .frame-img:nth-child(24) { animation-delay: 6.9s; }
        .frame-img:nth-child(25) { animation-delay: 7.2s; }
        
        .frame-counter {
            text-align: center;
            margin-top: 15px;
            font-size: 1rem;
            color: #666;
        }
    </style>
</head>

    <script>
        let currentFrame = 1;
        const totalFrames = 25;
        const frameDuration = 300; // 0.3 секунды на кадр (максимально ускорено)
        
        const frameCounter = document.getElementById('frameCounter');
        
        function updateCounter() {
            frameCounter.textContent = `Кадр ${currentFrame} из ${totalFrames}`;
        }
        
        function nextFrame() {
            currentFrame = (currentFrame % totalFrames) + 1;
            updateCounter();
        }
        
        setInterval(nextFrame, frameDuration);
        updateCounter();
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
